<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistor Color Code Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            margin-right: 10px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Resistor Color Code Calculator</h1>
    <label for="band1">Band 1:</label>
    <select id="band1">
        <option value="0">Black</option>
        <option value="1">Brown</option>
        <option value="2">Red</option>
        <option value="3">Orange</option>
        <option value="4">Yellow</option>
        <option value="5">Green</option>
        <option value="6">Blue</option>
        <option value="7">Violet</option>
        <option value="8">Gray</option>
        <option value="9">White</option>
    </select>
    <br>
    <label for="band2">Band 2:</label>
    <select id="band2">
        <option value="0">Black</option>
        <option value="1">Brown</option>
        <option value="2">Red</option>
        <option value="3">Orange</option>
        <option value="4">Yellow</option>
        <option value="5">Green</option>
        <option value="6">Blue</option>
        <option value="7">Violet</option>
        <option value="8">Gray</option>
        <option value="9">White</option>
    </select>
    <br>
    <label for="band3">Band 3:</label>
    <select id="band3">
        <option value="0">Black</option>
        <option value="1">Brown</option>
        <option value="2">Red</option>
        <option value="3">Orange</option>
        <option value="4">Yellow</option>
        <option value="5">Green</option>
        <option value="6">Blue</option>
        <option value="7">Violet</option>
        <option value="8">Gray</option>
        <option value="9">White</option>
    </select>
    <br>
    <label for="multiplier">Multiplier (Band 4):</label>
    <select id="multiplier">
        <option value="1">Black (x1)</option>
        <option value="10">Brown (x10)</option>
        <option value="100">Red (x100)</option>
        <option value="1000">Orange (x1000)</option>
        <option value="10000">Yellow (x10000)</option>
        <option value="0.1">Green (x0.1)</option>
        <option value="0.01">Blue (x0.01)</option>
        <option value="0.001">Gold (x0.001)</option>
        <option value="0.01">Silver (x0.01)</option>
    </select>
    <br>
    <button onclick="calculateResistance()">Calculate Resistance</button>
    <div id="result"></div>

    <script>
        function calculateResistance() {
            const band1 = parseInt(document.getElementById('band1').value);
            const band2 = parseInt(document.getElementById('band2').value);
            const band3 = parseInt(document.getElementById('band3').value);
            const multiplier = parseFloat(document.getElementById('multiplier').value);

            const resistance = (band1 * 10 + band2) * multiplier;
            document.getElementById('result').innerText = `Resistance: ${resistance} ohms`;
        }
    </script>
</body>
</html>
