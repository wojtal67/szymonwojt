<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator kodu paskowego rezystora (5 pasków)</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

.rezystor{
display:flex;
align-items:center;
justify-content:center;
margin-top:50px;
}

.przewod{
width:120px;
height:6px;
background:#777;
}

.korpus{
width:320px;
height:70px;
background:#e6d3a3;
border-radius:12px;
display:flex;
justify-content:space-evenly;
align-items:center;
}

.pasek{
width:18px;
height:70px;
cursor:pointer;
border:1px solid #333;
}

#wynik{
margin-top:30px;
font-size:22px;
font-weight:bold;
}

select{
margin-top:20px;
font-size:16px;
padding:5px;
}

</style>
</head>

<body>

<h2>Kalkulator kodu paskowego rezystora (5 pasków)</h2>
<p>Kliknij pasek aby zmienić kolor</p>

<div class="rezystor">

<div class="przewod"></div>

<div class="korpus">

<div class="pasek" id="p1"></div>
<div class="pasek" id="p2"></div>
<div class="pasek" id="p3"></div>
<div class="pasek" id="p4"></div>
<div class="pasek" id="p5"></div>

</div>

<div class="przewod"></div>

</div>

<br>

<select id="kolory">

<option value="#000000">Czarny</option>
<option value="#8B4513">Brązowy</option>
<option value="#FF0000">Czerwony</option>
<option value="#FFA500">Pomarańczowy</option>
<option value="#FFFF00">Żółty</option>
<option value="#008000">Zielony</option>
<option value="#0000FF">Niebieski</option>
<option value="#800080">Fioletowy</option>
<option value="#808080">Szary</option>
<option value="#FFFFFF">Biały</option>
<option value="#FFD700">Złoty</option>
<option value="#C0C0C0">Srebrny</option>

</select>

<div id="wynik">Rezystancja: -</div>

<script>

const paski = document.querySelectorAll(".pasek");
const wyborKoloru = document.getElementById("kolory");

let wybranyPasek = null;

const cyfry = {

"#000000":0,
"#8b4513":1,
"#ff0000":2,
"#ffa500":3,
"#ffff00":4,
"#008000":5,
"#0000ff":6,
"#800080":7,
"#808080":8,
"#ffffff":9

};

const mnozniki = {

"#000000":1,
"#8b4513":10,
"#ff0000":100,
"#ffa500":1000,
"#ffff00":10000,
"#008000":100000,
"#0000ff":1000000,
"#ffd700":0.1,
"#c0c0c0":0.01

};

const tolerancje = {

"#8b4513":"±1%",
"#ff0000":"±2%",
"#008000":"±0.5%",
"#0000ff":"±0.25%",
"#800080":"±0.1%",
"#808080":"±0.05%",
"#ffd700":"±5%",
"#c0c0c0":"±10%"

};

paski.forEach(p=>{

p.style.background="#000000";

p.addEventListener("click",()=>{

wybranyPasek=p;

});

});

wyborKoloru.addEventListener("change",()=>{

if(wybranyPasek){

wybranyPasek.style.background=wyborKoloru.value;

oblicz();

}

});

function oblicz(){

const b1 = cyfry[hex(paski[0].style.background)];
const b2 = cyfry[hex(paski[1].style.background)];
const b3 = cyfry[hex(paski[2].style.background)];

const mnoznik = mnozniki[hex(paski[3].style.background)] || 1;

const tolerancja = tolerancje[hex(paski[4].style.background)] || "";

const wartosc = ((b1*100)+(b2*10)+b3) * mnoznik;

document.getElementById("wynik").innerText =
"Rezystancja: " + wartosc + " Ω " + tolerancja;

}

function hex(rgb){

if(rgb.startsWith("#")) return rgb.toLowerCase();

const r = rgb.match(/\d+/g);

if(!r) return "#000000";

return "#"+
((1<<24)+(parseInt(r[0])<<16)+(parseInt(r[1])<<8)+parseInt(r[2]))
.toString(16)
.slice(1);

}

</script>

</body>
</html>
